<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riverbank Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <a href="https://rivergrandmother.com" class="nav-link">Work</a>
      <a href="https://rivergrandmother.com#about" class="nav-link">About</a>
      <a href="/" class="nav-link active">Riverbank</a>
    </nav>
  </header>

  <main class="list-page">
    <h1>Riverbank</h1>
    <p class="page-subtitle">A slow current of stories and essays</p>
    <ul class="essay-list" id="essay-list">
      <!-- Populated from essays.js -->
    </ul>
  </main>

  <footer>
    <p>River Grandmother © 2026</p>
  </footer>

  <script src="essays.js"></script>
  <script>
    const list = document.getElementById("essay-list");
    ESSAYS.forEach(essay => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = essay.slug + ".html";
      a.innerHTML = `\n        <span class="essay-title">${essay.title}</span>
        <span class="essay-date">${essay.date}</span>
      `;
      li.appendChild(a);
      if (essay.firstLine) {
        const first = document.createElement("p");
        first.className = "essay-first-line";
        first.textContent = essay.firstLine;
        li.appendChild(first);
      }
      list.appendChild(li);
    });

    // Set active navigation link based on current page
    function setActiveNavLink() {
      const currentPath = window.location.pathname;
      const navLinks = document.querySelectorAll('.nav-link');

      navLinks.forEach(link => {
        link.classList.remove('active');
        const linkPath = link.getAttribute('href');

        if (linkPath === '/' && (currentPath === '/' || currentPath === '/index.html')) {
          link.classList.add('active');
        } else if (linkPath === 'https://rivergrandmother.com#about' && currentPath.includes('about')) {
          link.classList.add('active');
        } else if (linkPath === 'https://rivergrandmother.com' && currentPath.includes('rivergrandmother.com')) {
          link.classList.add('active');
        }
      });
    }

    // Run on page load
    document.addEventListener('DOMContentLoaded', setActiveNavLink);
  </script>
</body>
</html>
